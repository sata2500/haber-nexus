name: Database Cleanup

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  cleanup-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Database Cleanup
        run: |
          echo "Starting database cleanup..."
          RESPONSE=$(curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}" \
            https://www.habernexus.com/api/cron/cleanup)
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "Response Status: $HTTP_STATUS"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Cleanup failed with status $HTTP_STATUS"
            exit 1
          fi
          
          echo "✅ Cleanup completed successfully"

      - name: Parse Results
        if: success()
        run: |
          echo "Parsing cleanup results..."
          # Results are already printed in previous step
          echo "Check the logs above for detailed results"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "⚠️ Cleanup workflow failed!"
          echo "Please check the logs and investigate the issue."
          # In production, you can add Slack/Discord/Email notifications here
